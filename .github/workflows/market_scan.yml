name: Market Scan & Hunter 🏹

on:
  schedule:
    # Run every hour from 6:00 UTC to 23:00 UTC (Approx 7AM - Midnight CET)
    - cron: '0 6-23 * * *'
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  hunt:
    runs-on: ubuntu-latest
    
    steps:
    - name: Check out code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run Hunter Pipeline
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        # Optional: Add DASHBOARD_PASSWORD/FLASK_SECRET_KEY if utilized in main.py (unlikely for pure pipeline)
      run: |
        python main.py
